<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StepThrough</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; background: var(--background);">

  <nav class="navbar">
    <div class="container nav-content">
      <a href="/" class="logo">StepThrough</a>
    </div>
  </nav>

  <main class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card" style="width: 100%; max-width: 400px;">
      <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
        Don't have an account? <a href="/register.html" style="color: var(--primary); font-weight: 500;">Sign up</a>
      </p>
    </div>
  </main>

  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');

      try {
        btn.innerHTML = 'Logging in...';
        btn.disabled = true;
        await Auth.login(email, password);
      } catch (err) {
        btn.innerHTML = 'Login';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
